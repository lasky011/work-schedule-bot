<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover" />
  <title>TNG Alice</title>
  <script src="https://telegram.org/js/telegram-web-app.js"></script>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,500;0,600&family=Jost:wght@400;500&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="/assets/app.css" />
</head>
<body>
  <div class="bg-pattern" aria-hidden="true"></div>

  <div id="splash" class="splash">
    <div class="card-loader" aria-hidden="true">
      <div class="card-stack">
        <span class="playing-card c1">♠</span>
        <span class="playing-card c2">♥</span>
        <span class="playing-card c3">♦</span>
      </div>
    </div>
    <div class="splash-brand">TNG · Alice</div>
  </div>

  <div id="app" class="app hidden">
    <header class="header">
      <div class="header-top">
        <div class="brand">TNG · Alice</div>
        <button type="button" class="settings-btn" id="open-settings" aria-label="настройки">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.4" stroke-linecap="round" aria-hidden="true">
            <line x1="5" y1="7" x2="19" y2="7"/>
            <circle cx="10" cy="7" r="2" fill="currentColor" stroke="none"/>
            <line x1="5" y1="12" x2="19" y2="12"/>
            <circle cx="15" cy="12" r="2" fill="currentColor" stroke="none"/>
            <line x1="5" y1="17" x2="19" y2="17"/>
            <circle cx="12" cy="17" r="2" fill="currentColor" stroke="none"/>
          </svg>
        </button>
      </div>
      <h1 class="title" id="screen-title">мой график</h1>
      <p class="subtitle" id="screen-subtitle">зазеркалье загружается…</p>
    </header>

    <main class="main" id="main"></main>

    <div id="compare-dock" class="compare-dock hidden" aria-hidden="true"></div>

    <nav class="nav" id="nav">
      <button type="button" class="nav-btn active" data-tab="schedule">
        <span class="nav-icon" aria-hidden="true"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.4" stroke-linecap="round"><rect x="4" y="5" width="16" height="15" rx="1.5"/><line x1="4" y1="9.5" x2="20" y2="9.5"/><line x1="9" y1="5" x2="9" y2="20"/><line x1="15" y1="5" x2="15" y2="20"/></svg></span>
        <span class="nav-label">график</span>
      </button>
      <button type="button" class="nav-btn" data-tab="team">
        <span class="nav-icon" aria-hidden="true"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.4" stroke-linecap="round" stroke-linejoin="round"><path d="M12 5l5 6.5L12 19 7 11.5 12 5z"/><circle cx="12" cy="11.5" r="1.5" fill="currentColor" stroke="none" opacity="0.55"/></svg></span>
        <span class="nav-label">смена</span>
      </button>
      <button type="button" class="nav-btn" data-tab="people">
        <span class="nav-icon" aria-hidden="true"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.4" stroke-linecap="round"><circle cx="8.5" cy="8" r="2.5"/><circle cx="15.5" cy="8" r="2.5"/><path d="M4.5 17c0-2.2 1.8-4 4-4M15.5 13c2.2 0 4 1.8 4 4"/><line x1="11" y1="8" x2="13" y2="8" opacity="0.45"/></svg></span>
        <span class="nav-label">коллеги</span>
      </button>
      <button type="button" class="nav-btn" data-tab="salary">
        <span class="nav-icon" aria-hidden="true"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.4" stroke-linecap="round"><path d="M8 6h6.2c1.9 0 3.3 1.1 3.3 2.7S16.1 11.4 14.2 11.4H8V6z"/><path d="M8 11.4V19"/><path d="M8 14.2h7.5"/></svg></span>
        <span class="nav-label">зп</span>
      </button>
      <button type="button" class="nav-btn" data-tab="analytics">
        <span class="nav-icon" aria-hidden="true"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.4" stroke-linecap="round"><line x1="6" y1="18" x2="6" y2="12"/><line x1="12" y1="18" x2="12" y2="7"/><line x1="18" y1="18" x2="18" y2="14"/><line x1="4" y1="18" x2="20" y2="18" opacity="0.35"/></svg></span>
        <span class="nav-label">стат</span>
      </button>
    </nav>
  </div>

  <div id="hours-sheet" class="sheet hidden" aria-hidden="true">
    <div class="sheet-backdrop" id="hours-backdrop"></div>
    <div class="sheet-panel">
      <div class="sheet-drag-zone" aria-hidden="true">
        <div class="sheet-handle"></div>
      </div>
      <div id="hours-content"></div>
    </div>
  </div>
  <div id="settings-sheet" class="sheet hidden" aria-hidden="true">
    <div class="sheet-backdrop" id="settings-backdrop"></div>
    <div class="sheet-panel">
      <div class="sheet-drag-zone" aria-hidden="true">
        <div class="sheet-handle"></div>
      </div>
      <div id="settings-content"></div>
    </div>
  </div>
  <div id="day-sheet" class="sheet hidden" aria-hidden="true">
    <div class="sheet-backdrop" id="day-backdrop"></div>
    <div class="sheet-panel sheet-panel-tall">
      <div class="sheet-drag-zone" aria-hidden="true">
        <div class="sheet-handle"></div>
      </div>
      <div id="day-content"></div>
    </div>
  </div>
  <script src="/assets/app.js"></script>
</body>
</html>
